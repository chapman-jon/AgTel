version: 2

models:
  # ---------------------------------------------------------------------------
  # Clean (staging) layer: 1:1 with each seed, passing every column through
  # unchanged except the enterprise ID, which is conformed to a single
  # representation — case-folded to lowercase (GUIDs are case-insensitive; SAP
  # stores uppercase, BST/AD lowercase) and with the all-zeros placeholder GUID
  # normalized to null (it means "unassigned"). Enterprise-ID uniqueness is tested
  # here, on the conformed value, rather than on the raw seed.
  # ---------------------------------------------------------------------------
  - name: ad_clean_farmers
    description: >
      ad_farmers with the enterprise ID conformed (lowercased; all-zeros
      placeholder GUID normalized to null). All other columns pass through.
    columns:
      - name: enterprise_id
        description: Conformed enterprise ID of the farmer; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: ad_clean_farms
    description: >
      ad_farms with the enterprise ID conformed (lowercased; all-zeros
      placeholder GUID normalized to null). All other columns pass through.
    columns:
      - name: enterprise_id
        description: Conformed enterprise ID of the farm; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: ad_clean_fields
    description: >
      ad_fields with the enterprise ID conformed (lowercased; all-zeros
      placeholder GUID normalized to null). All other columns pass through.
    columns:
      - name: enterprise_id
        description: Conformed enterprise ID of the field; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: bst_clean_growers
    description: >
      bst_growers with the enterprise ID conformed (lowercased; all-zeros
      placeholder GUID normalized to null). All other columns pass through.
    columns:
      - name: entrpr_guid
        description: Conformed enterprise ID of the grower; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: bst_clean_farms
    description: >
      bst_farms with the enterprise ID conformed (lowercased; all-zeros
      placeholder GUID normalized to null). All other columns pass through.
    columns:
      - name: entrpr_guid
        description: Conformed enterprise ID of the farm; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: bst_clean_fields
    description: >
      bst_fields with the enterprise ID conformed (lowercased; all-zeros
      placeholder GUID normalized to null). All other columns pass through.
    columns:
      - name: entrpr_guid
        description: Conformed enterprise ID of the field; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: sap_clean_partners
    description: >
      ZAGT_PARTNER with the enterprise ID conformed (lowercased from SAP's
      uppercase; all-zeros placeholder GUID normalized to null). All other columns
      pass through.
    columns:
      - name: ZZEID
        description: Conformed enterprise ID of the partner; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: sap_clean_farms
    description: >
      ZAGT_FARM with the enterprise ID conformed (lowercased from SAP's uppercase;
      all-zeros placeholder GUID normalized to null). All other columns pass
      through.
    columns:
      - name: ZZEID
        description: Conformed enterprise ID of the farm; null when unassigned.
        data_tests:
          - unique
          - is_lowercase

  - name: sap_clean_plots
    description: >
      ZAGT_PLOT with the enterprise ID conformed (lowercased from SAP's uppercase;
      all-zeros placeholder GUID normalized to null). All other columns pass
      through.
    columns:
      - name: ZZEID
        description: >
          Conformed enterprise ID of the plot; null when unassigned. Not unique at
          this grain — SAP re-keys plots, so several plot records can share one plot
          EID; uniqueness holds only after de-duplication in sap_non_null_plots.
        data_tests:
          - is_lowercase

  - name: ad_active_farmers
    description: >
      AD farmers filtered to is_test = false and status = active.
    columns:
      - name: farmer_id
        description: AD native primary key for the farmer.
        data_tests:
          - unique
          - not_null
      - name: is_test
        description: "`true` if the record was created for testing purposes during the port."
        data_tests:
          - not_null
          - accepted_values:
              values: [false]
              quote: false
      - name: status
        description: "Record status."
        data_tests:
          - not_null
          - accepted_values:
              values: [active]

  - name: ad_active_farms
    description: >
      AD farms filtered to is_test = false and status = active.
    columns:
      - name: farm_id
        description: AD native primary key for the farm.
        data_tests:
          - unique
          - not_null
      - name: is_test
        description: "`true` if the record was created for testing purposes during the port."
        data_tests:
          - not_null
          - accepted_values:
              values: [false]
              quote: false
      - name: status
        description: "Record status."
        data_tests:
          - not_null
          - accepted_values:
              values: [active]

  - name: ad_active_fields
    description: >
      AD fields filtered to is_test = false and status = active.
    columns:
      - name: field_id
        description: AD native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: is_test
        description: "`true` if the record was created for testing purposes during the port."
        data_tests:
          - not_null
          - accepted_values:
              values: [false]
              quote: false
      - name: status
        description: "Record status."
        data_tests:
          - not_null
          - accepted_values:
              values: [active]

  - name: bst_active_growers
    description: >
      BST growers filtered to stat_cd = 'A' (active) in the United States and
      Canada (excludes BST-only Australia). BST has no test-record flag.
    columns:
      - name: grower_id
        description: BST native primary key for the grower.
        data_tests:
          - unique
          - not_null
      - name: stat_cd
        description: "Record status code."
        data_tests:
          - not_null
          - accepted_values:
              values: [A]
      - name: country
        description: Country, stored as full name.
        data_tests:
          - not_null
          - accepted_values:
              values: ["United States", "Canada"]

  - name: bst_active_farms
    description: >
      BST farms filtered to stat_cd = 'A' (active) in the United States and
      Canada (excludes BST-only Australia).
    columns:
      - name: farm_id
        description: BST native primary key for the farm.
        data_tests:
          - unique
          - not_null
      - name: stat_cd
        description: "Record status code."
        data_tests:
          - not_null
          - accepted_values:
              values: [A]
      - name: country
        description: Country, stored as full name.
        data_tests:
          - not_null
          - accepted_values:
              values: ["United States", "Canada"]

  - name: bst_active_fields
    description: >
      BST fields filtered to stat_cd = 'A' (active), field_use_cd = 'PROD'
      (production fields, excluding trial plots), in the United States and
      Canada (excludes BST-only Australia).
    columns:
      - name: field_id
        description: BST native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: stat_cd
        description: "Record status code."
        data_tests:
          - not_null
          - accepted_values:
              values: [A]
      - name: field_use_cd
        description: "Field use code."
        data_tests:
          - not_null
          - accepted_values:
              values: [PROD]
      - name: country
        description: Country, stored as full name.
        data_tests:
          - not_null
          - accepted_values:
              values: ["United States", "Canada"]

  - name: sap_active_partners
    description: >
      SAP partners filtered to ZZSTAT = '02' (active), not flagged for deletion
      (LOEVM <> 'X'), PARTNER_TYPE = 'C' (customers, excluding prospects), in the
      US and Canada (excludes SAP-only Brazil).
    columns:
      - name: PARTNER_ID
        description: SAP native key for the business partner.
        data_tests:
          - unique
          - not_null
      - name: ZZSTAT
        description: "Partner lifecycle status code."
        data_tests:
          - not_null
          - accepted_values:
              values: ["02"]
      - name: PARTNER_TYPE
        description: "Partner type code."
        data_tests:
          - not_null
          - accepted_values:
              values: [C]
      - name: LAND1
        description: Country, ISO 3166-1 alpha-2 code.
        data_tests:
          - not_null
          - accepted_values:
              values: [US, CA]
      - name: LOEVM
        description: Deletion flag; always null here since LOEVM = 'X' rows are excluded.
        data_tests:
          - is_null

  - name: sap_active_farms
    description: >
      SAP farms filtered to ZZSTAT = '02' (active), not flagged for deletion
      (LOEVM <> 'X'), in the US and Canada (excludes SAP-only Brazil).
    columns:
      - name: FARM_ID
        description: SAP native key for the farm.
        data_tests:
          - unique
          - not_null
      - name: ZZSTAT
        description: "Farm lifecycle status code."
        data_tests:
          - not_null
          - accepted_values:
              values: ["02"]
      - name: LAND1
        description: Country, ISO 3166-1 alpha-2 code.
        data_tests:
          - not_null
          - accepted_values:
              values: [US, CA]
      - name: LOEVM
        description: Deletion flag; always null here since LOEVM = 'X' rows are excluded.
        data_tests:
          - is_null

  - name: sap_active_plots
    description: >
      SAP plots filtered to ZZSTAT = '02' (active), not flagged for deletion
      (LOEVM <> 'X'), in the US and Canada (excludes SAP-only Brazil).
    columns:
      - name: PLOT_ID
        description: SAP native key for the plot.
        data_tests:
          - unique
          - not_null
      - name: ZZSTAT
        description: "Plot lifecycle status code."
        data_tests:
          - not_null
          - accepted_values:
              values: ["02"]
      - name: LAND1
        description: Country, ISO 3166-1 alpha-2 code.
        data_tests:
          - not_null
          - accepted_values:
              values: [US, CA]
      - name: LOEVM
        description: Deletion flag; always null here since LOEVM = 'X' rows are excluded.
        data_tests:
          - is_null

  - name: ad_joined_fields
    description: >
      Active AD fields joined up the hierarchy to their active farm and active
      farmer (inner joins). One row per active field whose farm and farmer are
      also active. Carries only the source-system ID and enterprise ID at each
      level.
    columns:
      - name: field_id
        description: AD native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: field_enterprise_id
        description: Enterprise ID of the field.
        data_tests:
          - unique
      - name: farm_id
        description: AD native primary key for the field's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm.
      - name: farmer_id
        description: AD native primary key for the farm's farmer.
        data_tests:
          - not_null
      - name: farmer_enterprise_id
        description: Enterprise ID of the farmer.

  - name: bst_joined_fields
    description: >
      Active BST fields joined up the hierarchy to their active farm and active
      grower (inner joins). One row per active field whose farm and grower are
      also active. Carries only the source-system ID and enterprise ID at each
      level.
    columns:
      - name: field_id
        description: BST native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: field_enterprise_id
        description: Enterprise ID of the field.
        data_tests:
          - unique
      - name: farm_id
        description: BST native primary key for the field's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm.
      - name: grower_id
        description: BST native primary key for the farm's grower.
        data_tests:
          - not_null
      - name: grower_enterprise_id
        description: Enterprise ID of the grower.

  - name: sap_joined_plots
    description: >
      Active SAP plots joined up the hierarchy to their active farm and active
      partner (inner joins). One row per active plot whose farm and partner are
      also active. Carries only the source-system ID and enterprise ID at each
      level.
    columns:
      - name: plot_id
        description: SAP native key for the plot.
        data_tests:
          - unique
          - not_null
      - name: plot_enterprise_id
        description: >
          Enterprise ID of the plot. Not unique here — SAP re-keys plots, so
          several plot records can share one plot EID; uniqueness is asserted after
          de-duplication in sap_non_null_plots.
      - name: farm_id
        description: SAP native key for the plot's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm.
      - name: partner_id
        description: SAP native key for the farm's partner.
        data_tests:
          - not_null
      - name: partner_enterprise_id
        description: Enterprise ID of the partner.

  - name: ad_null_fields
    description: >
      Rows from ad_joined_fields where at least one enterprise ID (field, farm,
      or farmer) is null. Enterprise IDs are conformed upstream in ad_clean_*,
      where the all-zeros placeholder GUID is normalized to null, so both
      genuinely-missing and placeholder EIDs land here. I.e. active AD fields that
      could not be fully matched across systems because an enterprise ID has not
      yet been assigned at some level of the hierarchy.
    data_tests:
      - at_least_one_null:
          columns: [field_enterprise_id, farm_enterprise_id, farmer_enterprise_id]
    columns:
      - name: field_id
        description: AD native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: field_enterprise_id
        description: Enterprise ID of the field; may be null.
      - name: farm_id
        description: AD native primary key for the field's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm; may be null.
      - name: farmer_id
        description: AD native primary key for the farm's farmer.
        data_tests:
          - not_null
      - name: farmer_enterprise_id
        description: Enterprise ID of the farmer; may be null.

  - name: bst_null_fields
    description: >
      Rows from bst_joined_fields where at least one enterprise ID (field, farm,
      or grower) is null. Enterprise IDs are conformed upstream in bst_clean_*,
      where the all-zeros placeholder GUID is normalized to null, so both
      genuinely-missing and placeholder EIDs land here. I.e. active BST fields that
      could not be fully matched across systems because an enterprise ID has not
      yet been assigned at some level of the hierarchy.
    data_tests:
      - at_least_one_null:
          columns: [field_enterprise_id, farm_enterprise_id, grower_enterprise_id]
    columns:
      - name: field_id
        description: BST native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: field_enterprise_id
        description: Enterprise ID of the field; may be null.
      - name: farm_id
        description: BST native primary key for the field's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm; may be null.
      - name: grower_id
        description: BST native primary key for the farm's grower.
        data_tests:
          - not_null
      - name: grower_enterprise_id
        description: Enterprise ID of the grower; may be null.

  - name: sap_null_plots
    description: >
      Rows from sap_joined_plots where at least one enterprise ID (plot, farm,
      or partner) is null. Enterprise IDs are conformed upstream in sap_clean_*,
      where the all-zeros placeholder GUID is normalized to null, so both
      genuinely-missing and placeholder EIDs land here. I.e. active SAP plots that
      could not be fully matched across systems because an enterprise ID has not
      yet been assigned at some level of the hierarchy.
    data_tests:
      - at_least_one_null:
          columns: [plot_enterprise_id, farm_enterprise_id, partner_enterprise_id]
    columns:
      - name: plot_id
        description: SAP native key for the plot.
        data_tests:
          - unique
          - not_null
      - name: plot_enterprise_id
        description: Enterprise ID of the plot; may be null.
      - name: farm_id
        description: SAP native key for the plot's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm; may be null.
      - name: partner_id
        description: SAP native key for the farm's partner.
        data_tests:
          - not_null
      - name: partner_enterprise_id
        description: Enterprise ID of the partner; may be null.

  - name: ad_non_null_fields
    description: >
      Rows from ad_joined_fields where every enterprise ID (field, farm, and
      farmer) is populated. Enterprise IDs are conformed upstream in ad_clean_*,
      where the all-zeros placeholder GUID is normalized to null, so placeholder
      EIDs are excluded here just like genuine nulls. I.e. active AD fields that
      are fully matchable across systems because an enterprise ID has been assigned
      at every level of the hierarchy. Complement of ad_null_fields.
    columns:
      - name: field_id
        description: AD native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: field_enterprise_id
        description: Enterprise ID of the field.
        data_tests:
          - unique
          - not_null
      - name: farm_id
        description: AD native primary key for the field's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm.
        data_tests:
          - not_null
      - name: farmer_id
        description: AD native primary key for the farm's farmer.
        data_tests:
          - not_null
      - name: farmer_enterprise_id
        description: Enterprise ID of the farmer.
        data_tests:
          - not_null

  - name: bst_non_null_fields
    description: >
      Rows from bst_joined_fields where every enterprise ID (field, farm, and
      grower) is populated. Enterprise IDs are conformed upstream in bst_clean_*,
      where the all-zeros placeholder GUID is normalized to null, so placeholder
      EIDs are excluded here just like genuine nulls. I.e. active BST fields that
      are fully matchable across systems because an enterprise ID has been assigned
      at every level of the hierarchy. Complement of bst_null_fields.
    columns:
      - name: field_id
        description: BST native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: field_enterprise_id
        description: Enterprise ID of the field.
        data_tests:
          - unique
          - not_null
      - name: farm_id
        description: BST native primary key for the field's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm.
        data_tests:
          - not_null
      - name: grower_id
        description: BST native primary key for the farm's grower.
        data_tests:
          - not_null
      - name: grower_enterprise_id
        description: Enterprise ID of the grower.
        data_tests:
          - not_null

  - name: sap_non_null_plots
    description: >
      Rows from sap_joined_plots where every enterprise ID (plot, farm, and
      partner) is populated, de-duplicated to one row per distinct (plot, farm,
      partner) EID triple. Enterprise IDs are conformed upstream in sap_clean_*,
      where the all-zeros placeholder GUID is normalized to null, so placeholder
      EIDs are excluded here just like genuine nulls. SAP re-keys plots — the same
      physical field re-surveyed under a new PLOT_ID but sharing the same EID
      triple — so those rows collapse to a single field (lowest PLOT_ID kept) and
      parity counts each field once. I.e. the distinct, fully-matchable SAP fields.
      Complement of sap_null_plots, which keeps every unassigned-EID plot as its own
      row (an unmatched record can't be de-duplicated).
    data_tests:
      - unique_combination:
          columns: [plot_enterprise_id, farm_enterprise_id, partner_enterprise_id]
    columns:
      - name: plot_id
        description: >
          SAP native key of the representative plot kept for this field (the lowest
          PLOT_ID of the collapsed re-keyed rows). No longer the model's grain — the
          EID triple is — so it is not tested for uniqueness here.
        data_tests:
          - not_null
          - unique
      - name: plot_enterprise_id
        description: Enterprise ID of the plot.
        data_tests:
          - not_null
      - name: farm_id
        description: SAP native key for the plot's farm.
        data_tests:
          - not_null
      - name: farm_enterprise_id
        description: Enterprise ID of the farm.
        data_tests:
          - not_null
      - name: partner_id
        description: SAP native key for the farm's partner.
        data_tests:
          - not_null
      - name: partner_enterprise_id
        description: Enterprise ID of the partner.
        data_tests:
          - not_null

  - name: unioned_eids
    description: >
      Enterprise IDs for every fully-matched field hierarchy across all three
      sources (AD, BST, SAP), stacked into a common (farmer, farm, field) shape
      and de-duplicated. The top level is farmer (AD) / grower (BST) / partner
      (SAP) and the leaf is field (AD, BST) / plot (SAP); all map to the same
      real-world entities via their shared enterprise IDs. Sourced from the
      non_null models, so every EID is populated. Rows that are identical across
      sources (the cross-system overlap) collapse to one, so there are no
      duplicate rows.
    data_tests:
      - unique_combination:
          columns: [farmer_eid, farm_eid, field_eid]
    columns:
      - name: farmer_eid
        description: >
          Enterprise ID of the farmer-level entity (farmer in AD, grower in BST,
          partner in SAP).
        data_tests:
          - not_null
      - name: farm_eid
        description: Enterprise ID of the farm.
        data_tests:
          - not_null
      - name: field_eid
        description: >
          Enterprise ID of the field-level entity (field in AD and BST, plot in
          SAP).
        data_tests:
          - not_null

  - name: non_null_joined
    description: >
      The universe of fully-matched field-hierarchy enterprise IDs
      (unioned_eids) left-joined back to each source's non_null model to record,
      per (farmer, farm, field) EID triple, which of the three systems contain
      that exact triple. One row per distinct triple; in_ad / in_bst / in_sap
      flag membership. The join key is the full triple, so a source is flagged
      present only when it ties the same field to the same farm and farmer.
      Feeds the downstream field-parity (Venn) table.
    data_tests:
      - unique_combination:
          columns: [farmer_eid, farm_eid, field_eid]
    columns:
      - name: farmer_eid
        description: >
          Enterprise ID of the farmer-level entity (farmer in AD, grower in BST,
          partner in SAP).
        data_tests:
          - not_null
      - name: farm_eid
        description: Enterprise ID of the farm.
        data_tests:
          - not_null
      - name: field_eid
        description: >
          Enterprise ID of the field-level entity (field in AD and BST, plot in
          SAP).
        data_tests:
          - not_null
      - name: in_ad
        description: True when this exact EID triple exists in the AD non_null model.
        data_tests:
          - not_null
      - name: in_bst
        description: True when this exact EID triple exists in the BST non_null model.
        data_tests:
          - not_null
      - name: in_sap
        description: True when this exact EID triple exists in the SAP non_null model.
        data_tests:
          - not_null

  - name: non_null_parity
    description: >
      Field-parity table aggregating non_null_joined to one row per Venn region:
      each distinct combination of which systems contain a fully-matched
      (farmer, farm, field) EID triple. bst / sap / ad are 1/0 membership flags
      and count is the number of triples in that region. The all-zero region
      never appears because every triple belongs to at least one source, so the
      counts sum to the full non_null_joined population. Feeds the parity Venn
      diagram and overall parity metric.
    data_tests:
      - unique_combination:
          columns: [bst, sap, ad]
    columns:
      - name: bst
        description: 1 if the triple exists in BST, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: sap
        description: 1 if the triple exists in SAP, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: ad
        description: 1 if the triple exists in AD, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: count
        description: Number of distinct EID triples in this region.
        data_tests:
          - not_null

  - name: all_comb
    description: >
      non_null_parity with every non-empty membership combination guaranteed
      present. A region with no fully-matched triples is absent from
      non_null_parity; this model backfills those combinations with a count of 0
      so all 2^3 - 1 = 7 non-empty (bst, sap, ad) combinations always appear. The
      all-zero combination is intentionally excluded. Downstream of
      non_null_parity, upstream of field_parity.
    data_tests:
      - unique_combination:
          columns: [bst, sap, ad]
    columns:
      - name: bst
        description: 1 if the triple exists in BST, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: sap
        description: 1 if the triple exists in SAP, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: ad
        description: 1 if the triple exists in AD, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: count
        description: >
          Number of distinct fully-matched EID triples in this region; 0 for a
          backfilled combination.
        data_tests:
          - not_null

  - name: field_parity
    description: >
      The final field-parity table. Starts from all_comb (Venn regions for
      fully-matched EID triples, with every non-empty combination guaranteed
      present) and folds in each source's null-EID records via scalar subqueries:
      a record with a null enterprise ID cannot be matched to any other system,
      so it is added to its own source's single-source region (ad_null_fields ->
      AD-only, bst_null_fields -> BST-only, sap_null_plots -> SAP-only).
      Multi-source regions are unchanged. bst / sap / ad are 1/0 membership flags
      and count is the number of fields in that region; the counts sum to every
      field across all three systems. Feeds the parity Venn diagram and the
      overall parity metric.
    data_tests:
      - unique_combination:
          columns: [bst, sap, ad]
    columns:
      - name: bst
        description: 1 if the field belongs to the BST set, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: sap
        description: 1 if the field belongs to the SAP set, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: ad
        description: 1 if the field belongs to the AD set, else 0.
        data_tests:
          - not_null
          - accepted_values:
              values: [0, 1]
              quote: false
      - name: count
        description: >
          Number of fields in this region, including unmatched null-EID records
          in the single-source regions.
        data_tests:
          - not_null

  - name: overall_field_parity
    description: >
      Single-number "Overall Field Parity" metric: the count of fields present
      in all three systems (the 1,1,1 region of field_parity) divided by the
      total count of fields across all regions. One row, one column. 1.0 is
      perfect parity (every field exists in all three systems); values near 0
      mean little cross-system overlap. Intended as the headline number for
      tracking parity progress over time.
    columns:
      - name: overall_field_parity
        description: Fraction of all fields that exist in all three systems, in [0, 1].
        data_tests:
          - not_null
