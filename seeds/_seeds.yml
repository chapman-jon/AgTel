  - name: bst_fields
    description: >
      Fields from BST, AgTel's primary consultant-facing system. Full snapshot;
      legacy source columns preserved as-is. See context/source_data_dictionary.md.
    config:
      column_types:
        field_id: integer
        farm_id: integer
        field_nm: varchar
        stat_cd: varchar
        field_use_cd: varchar
        acres: double
        country: varchar
        entrpr_guid: varchar
        crt_dt: date
        upd_dt: date
    columns:
      - name: field_id
        description: BST native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: farm_id
        description: BST farm that the field belongs to. References bst_farms.farm_id.
        data_tests:
          - not_null
          - relationships:
              to: ref('bst_farms')
              field: farm_id
      - name: field_nm
        description: Field name as entered by the consultant or grower.
      - name: stat_cd
        description: "Record status code. Values observed: A, I, P."
        data_tests:
          - not_null
          - accepted_values:
              values: [A, I, P]
      - name: field_use_cd
        description: "Field use code. Values observed: PROD, TRIAL."
        data_tests:
          - not_null
          - accepted_values:
              values: [PROD, TRIAL]
      - name: acres
        description: Field area in acres.
      - name: country
        description: Country, stored as full name.
        data_tests:
          - not_null
          - accepted_values:
              values: ["United States", "Canada", "Australia"]
      - name: entrpr_guid
        description: Enterprise ID of the field.
        data_tests:
          - unique
      - name: crt_dt
        description: Date the record was created in BST.
      - name: upd_dt
        description: Date the record was last updated.

  - name: ZAGT_PARTNER
    description: >
      Business partners (SAP's model for farmers) from SAP, AgTel's ERP. Custom
      ZAGT_ master-data table; SAP column names preserved as-is. Weekly full
      snapshot. See context/source_data_dictionary.md.
    config:
      column_types:
        PARTNER_ID: varchar
        NAME1: varchar
        PARTNER_TYPE: varchar
        LAND1: varchar
        REGIO: varchar
        ZZSTAT: varchar
        LOEVM: varchar
        ZZEID: varchar
        ERDAT: date
    columns:
      - name: PARTNER_ID
        description: SAP native key for the business partner.
        data_tests:
          - unique
          - not_null
      - name: NAME1
        description: Partner name.
      - name: PARTNER_TYPE
        description: "Partner type code. Values observed: C, P."
        data_tests:
          - not_null
          - accepted_values:
              values: [C, P]
      - name: LAND1
        description: Country, ISO 3166-1 alpha-2 code.
        data_tests:
          - not_null
          - accepted_values:
              values: [US, CA, BR]
      - name: REGIO
        description: Region code (state/province) within the country.
      - name: ZZSTAT
        description: "Partner lifecycle status code. Values observed: 01, 02, 03."
        data_tests:
          - not_null
          - accepted_values:
              values: ["01", "02", "03"]
      - name: LOEVM
        description: Deletion flag. X if the record is flagged for deletion, blank otherwise.
        data_tests:
          - accepted_values:
              values: ["X"]
      - name: ZZEID
        description: Enterprise ID of the partner.
        data_tests:
          - unique
      - name: ERDAT
        description: Date the record was created in SAP.

