version: 2

seeds:
  - name: ad_farmers
    description: >
      Farmers extracted from AD, AgDigital's port of data from a legacy system
      restructured into a modern schema. Full snapshot; source columns are
      preserved as-is. See context/source_data_dictionary.md.
    config:
      column_types:
        farmer_id: varchar
        farmer_name: varchar
        status: varchar
        is_test: boolean
        country_code: varchar
        enterprise_id: varchar
        created_at: timestamp
        updated_at: timestamp
    columns:
      - name: farmer_id
        description: AD native primary key for the farmer.
        data_tests:
          - unique
          - not_null
      - name: farmer_name
        description: Farmer name.
      - name: status
        description: "Record status. Values observed: active, inactive, archived."
        data_tests:
          - not_null
          - accepted_values:
              values: [active, inactive, archived]
      - name: is_test
        description: "`true` if the record was created for testing purposes during the port."
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: country_code
        description: Country, ISO 3166-1 alpha-3 code.
        data_tests:
          - not_null
          - accepted_values:
              values: [USA, CAN]
      - name: enterprise_id
        description: Enterprise ID of the farmer.
        data_tests:
          - unique
      - name: created_at
        description: Timestamp the record was created in AD.
      - name: updated_at
        description: Timestamp the record was last updated.

