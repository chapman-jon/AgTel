  - name: ad_fields
    description: >
      Fields extracted from AD, AgDigital's port of data from a legacy system
      restructured into a modern schema. Full snapshot; source columns are
      preserved as-is. Fields carry no country_code (country is a property of
      the farm). See context/source_data_dictionary.md.
    config:
      column_types:
        field_id: varchar
        farm_id: varchar
        field_name: varchar
        status: varchar
        is_test: boolean
        area_ha: double
        enterprise_id: varchar
        created_at: timestamp
        updated_at: timestamp
    columns:
      - name: field_id
        description: AD native primary key for the field.
        data_tests:
          - unique
          - not_null
      - name: farm_id
        description: Farm that the field belongs to. References ad_farms.farm_id.
        data_tests:
          - not_null
          - relationships:
              to: ref('ad_farms')
              field: farm_id
      - name: field_name
        description: Field name.
      - name: status
        description: "Record status. Values observed: active, inactive, archived."
        data_tests:
          - not_null
          - accepted_values:
              values: [active, inactive, archived]
      - name: is_test
        description: "`true` if the record was created for testing purposes during the port."
        data_tests:
          - not_null
          - accepted_values:
              values: [true, false]
              quote: false
      - name: area_ha
        description: Field area in hectares.
      - name: enterprise_id
        description: Enterprise ID of the field.
        data_tests:
          - unique
      - name: created_at
        description: Timestamp the record was created in AD.
      - name: updated_at
        description: Timestamp the record was last updated.

  - name: bst_growers
    description: >
      Growers (BST's term for farmers) from BST, AgTel's primary
      consultant-facing system. Full snapshot; legacy source columns preserved
      as-is. See context/source_data_dictionary.md.
    config:
      column_types:
        grower_id: integer
        grower_nm: varchar
        stat_cd: varchar
        country: varchar
        state_prov: varchar
        entrpr_guid: varchar
        crt_dt: date
        upd_dt: date
    columns:
      - name: grower_id
        description: BST native primary key for the grower.
        data_tests:
          - unique
          - not_null
      - name: grower_nm
        description: Grower name.
      - name: stat_cd
        description: "Record status code. Values observed: A, I, P."
        data_tests:
          - not_null
          - accepted_values:
              values: [A, I, P]
      - name: country
        description: Country, stored as full name.
        data_tests:
          - not_null
          - accepted_values:
              values: ["United States", "Canada", "Australia"]
      - name: state_prov
        description: State or province.
      - name: entrpr_guid
        description: Enterprise ID of the grower. Populated when the record has been through enterprise assignment.
        data_tests:
          - unique
      - name: crt_dt
        description: Date the record was created in BST.
      - name: upd_dt
        description: Date the record was last updated.

